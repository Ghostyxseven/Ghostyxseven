<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ1ADS</title>
    <link rel="stylesheet" href="style.css">
</head>
<link rel="icon" href="image.png" type="image/png">
<body>

    <h1 class="quiz-title">QUIZ<span> 1ADS</span></h1>
    <h2 class="quiz-desc">Teste seu conhecimento!</h2>
    <p class="quiz-desc2">Responda as perguntas e veja sua pontuação.</p>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Tela de Entrada de Nome -->
            <div id="start-screen" class="start-screen active">
                <p>Para começar, digite seu nome:</p>
                <div class="input-group">
                    <input type="text" id="nomeInput" placeholder="Seu nome aqui">
                </div>
                <button id="start-btn" class="quiz-btn">Começar</button>
            </div>

            <!-- Tela de Seleção de Temas -->
            <div id="theme-screen" class="theme-screen">
                <h2 id="welcome-text"></h2>
                <div class="options-container" id="theme-options">
                    <!-- Botões dos temas serão adicionados aqui via JS -->
                </div>
            </div>

            <!-- Tela do Quiz -->
            <div id="quiz-screen" class="quiz-screen">
                <h3 class="question" id="question-text"></h3>
                <div class="options-container" id="options-container">
                    <!-- Botões de opções serão injetados aqui via JS -->
                </div>
                <button id="next-btn" class="quiz-btn" style="display: none;">Próxima Pergunta</button>
                <p class="progress-text" id="progress-text"></p>
            </div>

            <!-- Tela de Resultado -->
            <div id="result-screen" class="result-screen">
                <h2>Quiz Concluído!</h2>
                <p>Sua pontuação: <span id="score-text"></span></p>
                <button id="restart-btn" class="quiz-btn">Jogar Novamente</button>
            </div>
            
        </div>
    </div>
    
    <div id="messageBox"></div>
<script src="quiz.js" defer></script>
</body>
